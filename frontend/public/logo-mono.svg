<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Monochrome version - uses currentColor so it inherits text color -->

  <!-- Chip body -->
  <rect x="20" y="20" width="80" height="80" rx="8" ry="8"
        fill="none" stroke="currentColor" stroke-width="2.5"/>

  <!-- Left side: RJ45/Ethernet pins -->
  <g fill="currentColor">
    <rect x="10" y="28" width="14" height="4" rx="1"/>
    <rect x="10" y="36" width="14" height="4" rx="1"/>
    <rect x="10" y="44" width="14" height="4" rx="1"/>
    <rect x="10" y="52" width="14" height="4" rx="1"/>
    <rect x="10" y="60" width="14" height="4" rx="1"/>
    <rect x="10" y="68" width="14" height="4" rx="1"/>
    <rect x="10" y="76" width="14" height="4" rx="1"/>
    <rect x="10" y="84" width="14" height="4" rx="1"/>
  </g>

  <!-- Right side: Cockpit button pins -->
  <g fill="currentColor">
    <rect x="96" y="30" width="14" height="6" rx="2"/>
    <rect x="96" y="42" width="14" height="6" rx="2"/>
    <rect x="96" y="54" width="14" height="6" rx="2"/>
    <rect x="96" y="66" width="14" height="6" rx="2"/>
    <rect x="96" y="78" width="14" height="6" rx="2"/>
  </g>

  <!-- Circuit traces -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <path d="M24 30 H40 V33 H75 V33 H96"/>
    <path d="M24 38 H35 V45 H80 V45 H96"/>
    <path d="M24 54 H45 V57 H70 V57 H96"/>
    <path d="M24 62 H42 V69 H73 V69 H96"/>
    <path d="M24 78 H38 V81 H78 V81 H96"/>
  </g>

  <!-- Center button -->
  <circle cx="60" cy="60" r="14" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="60" cy="60" r="9" fill="currentColor" opacity="0.3"/>
  <path d="M60 55 V62 M56 58 A5 5 0 1 0 64 58"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Via points -->
  <g fill="currentColor">
    <circle cx="40" cy="33" r="2"/>
    <circle cx="75" cy="33" r="2"/>
    <circle cx="35" cy="45" r="2"/>
    <circle cx="80" cy="45" r="2"/>
    <circle cx="45" cy="57" r="2"/>
    <circle cx="70" cy="57" r="2"/>
    <circle cx="42" cy="69" r="2"/>
    <circle cx="73" cy="69" r="2"/>
    <circle cx="38" cy="81" r="2"/>
    <circle cx="78" cy="81" r="2"/>
  </g>
</svg>
