<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="100%" style="stop-color:#0d3251"/>
    </linearGradient>
  </defs>

  <!-- Chip body -->
  <rect x="6" y="6" width="20" height="20" rx="3" fill="url(#chipGrad)" stroke="#049fd9" stroke-width="1.5"/>

  <!-- Left pins (simplified - 4 pins) -->
  <g fill="#049fd9">
    <rect x="2" y="9" width="5" height="2" rx="0.5"/>
    <rect x="2" y="13" width="5" height="2" rx="0.5"/>
    <rect x="2" y="17" width="5" height="2" rx="0.5"/>
    <rect x="2" y="21" width="5" height="2" rx="0.5"/>
  </g>

  <!-- Right pins (simplified - 3 pins) -->
  <g fill="#00bceb">
    <rect x="25" y="10" width="5" height="3" rx="1"/>
    <rect x="25" y="15" width="5" height="3" rx="1"/>
    <rect x="25" y="20" width="5" height="3" rx="1"/>
  </g>

  <!-- Center glow button -->
  <circle cx="16" cy="16" r="5" fill="#00bceb" opacity="0.9"/>
  <circle cx="16" cy="16" r="3" fill="#0a2540"/>
</svg>
