# =============================================================================
# Codecov Configuration
# =============================================================================
# https://docs.codecov.com/docs/codecov-yaml

coverage:
  precision: 2
  round: down
  range: "50...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true  # Don't fail PR on coverage decrease during dev
    patch:
      default:
        target: auto
        threshold: 5%
        informational: true

parsers:
  gcov:
    branch_detection:
      conditional: yes
      loop: yes
      method: no
      macro: no

flags:
  backend:
    paths:
      - backend/
    carryforward: true
  frontend:
    paths:
      - frontend/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "**/tests/**"
  - "**/test_*.py"
  - "**/__pycache__/**"
  - "**/alembic/**"
  - "**/node_modules/**"
  - "**/*.config.js"
  - "**/*.config.ts"
